<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты — админка</title>
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="admin-body">
<aside class="admin-sidebar">
    <h2>Decard Admin</h2>
    <nav>
        <a href="/admin/index.html">Главная</a>
        <a href="/admin/homepage.html">Главная страница</a>
        <a href="/admin/news.html">Новости / статьи</a>
        <a href="/admin/projects.html" class="active">Проекты / портфолио</a>
        <a href="/admin/logout">Выйти</a>
    </nav>
</aside>

<main class="admin-main">
    <div class="admin-topbar">
        <h1>Проекты / портфолио</h1>
        <a class="admin-button" href="/admin/project-editor.html">+ Добавить проект</a>
    </div>

    <div id="projects-list" class="admin-list"></div>
</main>

<script>
    function escapeHtml(str) {
        return String(str || '').replace(/[&<>"']/g, s => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[s]));
    }

    async function loadProjects() {
        const res = await fetch('/admin/api/projects');
        if (res.status === 401) { location.href = '/admin/login.html'; return; }
        const projects = await res.json();

        const container = document.getElementById('projects-list');

        if (!projects.length) {
            container.innerHTML = '<p class="admin-empty">Проектов пока нет. Нажмите «Добавить проект», чтобы создать первый.</p>';
            return;
        }

        container.innerHTML = projects.map(item => {
            let services = [];
            try { services = JSON.parse(item.services || '[]'); } catch (e) {}
            const servicesHtml = services.map(s => `<span class="admin-tag admin-tag--sm">${escapeHtml(s)}</span>`).join(' ');

            return `
                <div class="admin-card">
                    <div class="admin-card-thumb">
                        ${item.cover_image
                            ? `<img src="${item.cover_image}" alt="">`
                            : `<div class="admin-card-thumb__empty">Без обложки</div>`}
                    </div>
                    <div class="admin-card-body">
                        <div class="admin-card-meta">
                            <span class="admin-status admin-status--${item.status}">${item.status === 'published' ? 'Опубликован' : 'Черновик'}</span>
                            ${item.place ? `<span>📍 ${escapeHtml(item.place)}</span>` : ''}
                            ${item.city ? `<span>${escapeHtml(item.city)}</span>` : ''}
                            ${item.year ? `<span>${item.year}</span>` : ''}
                            ${item.season ? `<span>${escapeHtml(item.season)}</span>` : ''}
                            <span>#${item.sort_order || 0}</span>
                        </div>
                        <h3>${escapeHtml(item.title)}</h3>
                        <p class="admin-muted">slug: <code>${escapeHtml(item.slug)}</code></p>
                        ${servicesHtml ? `<div class="admin-tags-row">${servicesHtml}</div>` : ''}
                    </div>
                    <div class="admin-card-actions">
                        <a class="admin-button ghost" href="/admin/project-editor.html?id=${item.id}">Редактировать</a>
                        ${item.status === 'published'
                            ? `<a class="admin-button ghost" target="_blank" href="/pages/project.html?slug=${encodeURIComponent(item.slug)}">Открыть</a>`
                            : ''}
                        <button class="admin-button danger" onclick="deleteProject(${item.id})">Удалить</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function deleteProject(id) {
        if (!confirm('Удалить проект? Действие необратимо.')) return;
        await fetch('/admin/api/projects/' + id, { method: 'DELETE' });
        loadProjects();
    }

    loadProjects();
</script>
</body>
</html>
